name: Deploy Homolog

on:
  push:
    branches:
      - homolog
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy on the remote VM
        required: false
        default: homolog

concurrency:
  group: deploy-homolog
  cancel-in-progress: true

jobs:
  resolve-branch:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - name: Resolve deploy branch
        id: resolve
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${GITHUB_REF_NAME}"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  validate:
    runs-on: ubuntu-latest
    needs: resolve-branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate deploy script syntax
        run: bash -n scripts/deploy-homolog.sh

  deploy:
    runs-on: ubuntu-latest
    needs:
      - resolve-branch
      - validate
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOMOLOG_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HOMOLOG_SSH_PORT }}" -H "${{ secrets.HOMOLOG_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Oracle Cloud VM
        env:
          HOMOLOG_HOST: ${{ secrets.HOMOLOG_HOST }}
          HOMOLOG_USER: ${{ secrets.HOMOLOG_USER }}
          HOMOLOG_SSH_PORT: ${{ secrets.HOMOLOG_SSH_PORT }}
          HOMOLOG_APP_DIR: ${{ secrets.HOMOLOG_APP_DIR }}
          DEPLOY_BRANCH: ${{ needs.resolve-branch.outputs.branch }}
        run: |
          ssh -p "$HOMOLOG_SSH_PORT" "$HOMOLOG_USER@$HOMOLOG_HOST" \
            "cd '$HOMOLOG_APP_DIR' && export HOMOLOG_BRANCH='$DEPLOY_BRANCH' && bash scripts/deploy-homolog.sh"
