map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  listen [::]:80;
  server_name intradebas.com.br www.intradebas.com.br api.intradebas.com.br;

  if ($host = api.intradebas.com.br) {
    return 301 https://api.intradebas.com.br$request_uri;
  }

  return 301 https://intradebas.com.br$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.intradebas.com.br;

  ssl_certificate /etc/letsencrypt/live/intradebas.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/intradebas.com.br/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  return 301 https://intradebas.com.br$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.intradebas.com.br;

  ssl_certificate /etc/letsencrypt/live/intradebas.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/intradebas.com.br/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20m;

  location / {
    proxy_pass http://127.0.0.1:14000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name intradebas.com.br;

  ssl_certificate /etc/letsencrypt/live/intradebas.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/intradebas.com.br/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20m;

  location / {
    proxy_pass http://127.0.0.1:13000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
  }
}
