services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: intradebas-frontend
    command: npm run dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - intradebas-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    container_name: intradebas-backend
    command: npm run start:dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - intradebas-net

  db:
    image: postgres:16-alpine
    container_name: intradebas-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intradebas-net

  redis:
    image: redis:7-alpine
    container_name: intradebas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - intradebas-net

  minio:
    image: minio/minio:latest
    container_name: intradebas-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - intradebas-net

  minio-init:
    image: minio/mc:latest
    container_name: intradebas-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set intradebas http://$${MINIO_ENDPOINT}:$${MINIO_PORT} $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do
          sleep 2
        done
        mc mb --ignore-existing intradebas/$${MINIO_BUCKET}
    restart: "no"
    networks:
      - intradebas-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: intradebas-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - intradebas-net

  nginx:
    image: nginx:alpine
    container_name: intradebas-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - intradebas-net

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  intradebas-net:
    driver: bridge
